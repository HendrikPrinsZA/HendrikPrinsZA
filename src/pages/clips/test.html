<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Autoplay Audio</title>
</head>
<body>

  <h2>Audio Player</h2>

  <audio id="audio" autoplay>
    <source src="/assets/tmp/spinning.wav" type="audio/wav">
    Your browser does not support the audio element.
  </audio>

  <p id="status">Trying to autoplay...</p>

  <button id="playBtn" style="display:none;">
    Click to Play Audio
  </button>

  <script>
    const audio = document.getElementById("audio");
    const status = document.getElementById("status");
    const btn = document.getElementById("playBtn");

    // Try to autoplay
    window.addEventListener("load", async () => {
      try {
        await audio.play();
        status.textContent = "Playing audio automatically.";
      } catch (err) {
        status.textContent = "Autoplay blocked by browser.";

        // Show fallback button
        btn.style.display = "inline-block";
      }
    });

    // Fallback user interaction
    btn.addEventListener("click", async () => {
      try {
        await audio.play();
        status.textContent = "Audio playing after user click.";
        btn.style.display = "none";
      } catch (err) {
        status.textContent = "Still cannot play audio.";
      }
    });
  </script>

</body>
</html>
